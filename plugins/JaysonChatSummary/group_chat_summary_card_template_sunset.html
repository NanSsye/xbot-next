<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Inter:wght@300;500;700;800&family=Fira+Code:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --card-width: 920px;

        --sunset-1: #1a0533;
        --sunset-2: #2d1b4e;
        --sunset-3: #5c2d82;

        --glass: rgba(255, 255, 255, 0.06);
        --glass-border: rgba(255, 255, 255, 0.12);
        --glass-strong: rgba(255, 255, 255, 0.10);

        --text: #fff;
        --muted: rgba(255, 255, 255, 0.65);
        --faint: rgba(255, 255, 255, 0.38);

        --a-orange: #ff8c42;
        --a-pink: #ff6b9d;
        --a-gold: #ffd369;
        --a-lavender: #c9b1ff;

        --font-title: "Inter", "Noto Sans SC", system-ui, sans-serif;
        --font-body: "Noto Sans SC", system-ui, sans-serif;
        --font-mono: "Fira Code", monospace;

        --r-lg: 28px;
        --r-md: 18px;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }

      body {
        margin: 0;
        padding: 24px 20px;
        color: var(--text);
        font-family: var(--font-body);
        background:
          radial-gradient(ellipse 140% 70% at 20% 0%, #ff6b9d55, transparent),
          radial-gradient(ellipse 120% 80% at 80% 10%, #ff8c4244, transparent),
          radial-gradient(ellipse 100% 60% at 50% 100%, #ffd36933, transparent),
          linear-gradient(175deg, var(--sunset-1), var(--sunset-2) 40%, var(--sunset-3));
        min-height: 100vh;
      }

      #card {
        width: 100%;
        max-width: var(--card-width);
        margin: 0 auto;
        border-radius: var(--r-lg);
        background: var(--glass);
        backdrop-filter: blur(32px) saturate(140%);
        -webkit-backdrop-filter: blur(32px) saturate(140%);
        border: 1px solid var(--glass-border);
        box-shadow:
          0 40px 80px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .signal {
        height: 5px;
        background: linear-gradient(90deg, var(--a-orange), var(--a-pink), var(--a-lavender), var(--a-gold));
      }

      .frame { padding: 26px 28px 28px; }

      .top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
      }

      .brand { display: grid; gap: 10px; }

      .kicker {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-family: var(--font-mono);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--a-gold);
      }

      .kicker .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--a-orange);
        box-shadow: 0 0 12px var(--a-orange);
        animation: glow 2s ease-in-out infinite;
      }

      @keyframes glow {
        0%, 100% { box-shadow: 0 0 6px var(--a-orange); opacity: 0.7; }
        50% { box-shadow: 0 0 18px var(--a-orange), 0 0 36px rgba(255, 140, 66, 0.3); opacity: 1; }
      }

      .title {
        font-family: var(--font-title);
        font-weight: 800;
        font-size: 52px;
        letter-spacing: -0.03em;
        line-height: 1;
        margin: 0;
        background: linear-gradient(135deg, #fff 20%, var(--a-gold) 60%, var(--a-orange));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        margin: 0;
        font-size: 17px;
        color: var(--muted);
        font-weight: 300;
      }

      .meta {
        text-align: right;
        display: grid;
        gap: 8px;
        padding-top: 4px;
      }

      .meta .date {
        font-family: var(--font-mono);
        font-size: 14px;
        color: var(--muted);
      }

      .meta .group {
        font-family: var(--font-title);
        font-weight: 700;
        font-size: 16px;
        color: var(--a-pink);
      }

      .divider {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 107, 157, 0.4), rgba(255, 211, 105, 0.4), transparent);
        margin: 18px 0;
      }

      .vibe {
        border-radius: var(--r-md);
        padding: 14px 18px;
        background:
          radial-gradient(500px 200px at 0% 50%, rgba(255, 107, 157, 0.15), transparent),
          radial-gradient(400px 200px at 100% 50%, rgba(255, 211, 105, 0.12), transparent),
          var(--glass-strong);
        border: 1px solid rgba(255, 107, 157, 0.2);
        position: relative;
      }

      .vibe::after {
        content: "VIBE";
        position: absolute;
        right: 16px; top: 12px;
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.25em;
        color: var(--faint);
      }

      .vibe p {
        margin: 0;
        font-size: 18px;
        line-height: 1.7;
        font-weight: 400;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-top: 16px;
      }

      .panel {
        border-radius: var(--r-md);
        background: var(--glass);
        border: 1px solid var(--glass-border);
        padding: 16px;
      }

      .panel__hd {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .panel__title {
        margin: 0;
        font-family: var(--font-title);
        font-weight: 700;
        font-size: 16px;
      }

      .panel__hint {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--faint);
        letter-spacing: 0.08em;
      }

      .speakers { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }

      .speaker {
        display: flex; justify-content: space-between; align-items: center;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.07);
      }

      .speaker__left { display: flex; align-items: center; gap: 10px; min-width: 0; }

      .rank {
        width: 26px; height: 26px; border-radius: 50%;
        background: linear-gradient(135deg, var(--a-orange), var(--a-pink));
        color: #fff;
        font-family: var(--font-mono);
        font-size: 12px; font-weight: 600;
        display: grid; place-items: center;
        flex-shrink: 0;
      }

      .name {
        font-size: 14px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        max-width: 200px;
      }

      .count {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--muted);
      }

      .tips { font-size: 14px; line-height: 1.65; color: var(--muted); margin: 0; }

      .overview-greeting {
        font-size: 18px; font-weight: 700; color: var(--a-orange); margin: 0 0 8px 0;
      }
      .overview-date {
        font-family: var(--font-mono); font-size: 12px; color: var(--faint); margin: 0 0 10px 0; letter-spacing: 0.04em;
      }
      .overview-stats {
        font-size: 14px; line-height: 1.7; color: var(--muted); margin: 0 0 10px 0;
      }
      .overview-stats .highlight { color: var(--a-gold); font-weight: 600; }
      .overview-quote {
        font-size: 13px; line-height: 1.6; color: var(--faint); margin: 8px 0 0 0;
        padding-top: 8px; border-top: 1px dashed rgba(255,211,105,0.25); font-style: italic;
      }
      .overview-nightowl { font-size: 13px; color: var(--a-gold); margin: 8px 0 0 0; }

      .topics { margin-top: 18px; }

      .topics__hd {
        display: flex; align-items: baseline; justify-content: space-between;
        margin-bottom: 12px;
      }

      .topics__title {
        margin: 0;
        font-family: var(--font-title);
        font-weight: 800;
        font-size: 22px;
      }

      .topics__sub {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--faint);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .topic {
        --topic-accent: var(--a-orange);
        display: grid;
        grid-template-columns: 100px 1fr;
        gap: 16px;
        padding: 14px 14px;
        border-radius: var(--r-md);
        background:
          radial-gradient(400px 180px at 10% 30%, color-mix(in srgb, var(--topic-accent) 20%, transparent), transparent),
          var(--glass);
        border: 1px solid rgba(255, 255, 255, 0.10);
        position: relative;
        overflow: hidden;
      }

      .topic + .topic { margin-top: 12px; }

      .topic__left { display: grid; gap: 8px; align-content: start; justify-items: center; }

      .topic__index {
        width: 48px; height: 48px;
        border-radius: 16px;
        background: linear-gradient(135deg, color-mix(in srgb, var(--topic-accent) 50%, transparent), rgba(0,0,0,0.3));
        border: 1px solid color-mix(in srgb, var(--topic-accent) 40%, transparent);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        display: grid; place-items: center;
        font-family: var(--font-title);
        font-size: 22px; font-weight: 800;
        color: #fff;
      }

      .topic__heat {
        display: flex; flex-wrap: wrap; gap: 2px;
      }

      .flame {
        font-size: 16px;
        line-height: 1;
        font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
        filter: drop-shadow(0 4px 8px rgba(255, 140, 66, 0.3));
      }

      .topic__body { min-width: 0; }

      .topic__title {
        font-family: var(--font-title);
        font-weight: 700;
        font-size: 21px;
        letter-spacing: -0.01em;
        line-height: 1.25;
        margin: 0 0 8px 0;
      }

      .topic__meta {
        display: flex; flex-wrap: wrap; gap: 8px;
        margin-bottom: 12px;
      }

      .pill {
        display: inline-flex; align-items: center;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.10);
        font-size: 13px;
        color: var(--muted);
      }

      .topic__process {
        font-size: 15px;
        line-height: 1.65;
        color: rgba(255, 255, 255, 0.85);
        margin: 0 0 8px 0;
      }

      .topic__rating {
        font-size: 14px;
        line-height: 1.5;
        color: var(--a-gold);
        font-weight: 500;
        margin: 0;
        padding-top: 10px;
        border-top: 1px dashed rgba(255, 211, 105, 0.25);
      }

      .footer {
        padding: 14px 28px 16px;
        border-top: 1px solid var(--glass-border);
        display: flex; justify-content: space-between; align-items: center;
        background: rgba(0, 0, 0, 0.18);
      }

      .footer__left { display: flex; align-items: center; gap: 10px; }
      .header { display: flex; align-items: center; gap: 10px; }

      .logo {
        width: 32px; height: 32px;
        border-radius: 10px;
        object-fit: cover;
        border: 1px solid var(--glass-border);
      }

      .brand-name {
        font-family: var(--font-title);
        font-weight: 600;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.8);
      }

      .footer__note {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--faint);
        text-align: right;
      }
    </style>
  </head>

  <body>
    <div id="card">
      <div class="signal"></div>

      <div class="frame">
        <div class="top">
          <div class="brand">
            <div class="kicker"><span class="dot"></span> GROUP CHAT DAILY BRIEF</div>
            <h1 class="title">群聊总结</h1>
            <p class="subtitle">把今天的"吵点 / 知识点 / 梗点"压缩成一张卡片。</p>
          </div>

          <div class="meta">
            <div class="date">日期：{{report_date}}</div>
            <div class="group">群聊：{{group_name}}</div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="vibe">
          <p>{{vibe_line}}</p>
        </div>

        <div class="row">
          <div class="panel">
            <div class="panel__hd">
              <h3 class="panel__title">Top 发言者</h3>
              <div class="panel__hint">MOST ACTIVE</div>
            </div>
            <ul class="speakers">{{top_speakers_html}}</ul>
          </div>

          <div class="panel">
            <div class="panel__hd">
              <h3 class="panel__title">群聊速览</h3>
            </div>
            {{overview_html}}
          </div>
        </div>

        <div class="topics">
          <div class="topics__hd">
            <h2 class="topics__title">今日话题</h2>
            <div class="topics__sub">TOPICS / TIMELINE</div>
          </div>
          <div>{{topics_html}}</div>
        </div>
      </div>

      <div class="footer">
        <div class="footer__left"></div>
        <div class="footer__note">{{footer_note}}</div>
      </div>
    </div>
  </body>
</html>
