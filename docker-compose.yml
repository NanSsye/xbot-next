services:
  xbot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_PLAYWRIGHT: ${INSTALL_PLAYWRIGHT:-false}
        APT_MIRROR: ${APT_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/debian}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    image: xbot-next:local
    pull_policy: build
    container_name: xbot-next-app
    restart: unless-stopped
    environment:
      # 不使用 env_file 注入 .env；应用在启动时读取 /app/.env。
      # 这样修改宿主机 .env 后，只需 docker compose restart xbot 即可生效。
      XBOT_SERVER_HOST: 0.0.0.0
      XBOT_DOCKER_INSTALL_DEPS_ON_START: "false"
      XBOT_DOCKER_BUILD_UI_ON_START: "false"
    ports:
      - "8548:8548"
      - "18790:8548"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # 直接映射整个项目目录。升级时替换宿主机目录里的代码，然后重启容器即可。
      - .:/app
      # 避免前端依赖污染项目目录，也避免每次重启都重新下载 node_modules。
      - ./docker-data/ui-node_modules:/app/ui/node_modules
      - ./docker-data/pip-cache:/root/.cache/pip
      - ./docker-data/npm-cache:/root/.npm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy


  postgres:
    image: postgres:16-alpine
    container_name: xbot-next-postgres
    restart: unless-stopped
    ports:
      - "8549:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: xbot-next-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
